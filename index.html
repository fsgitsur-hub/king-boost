<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING AMIR SYSTEM</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #fb1; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 0 20px #fb1; }
        h1 { color: #fb1; text-transform: uppercase; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #fb1; background: #111; color: #fff; font-size: 16px; }
        .btn { background: #fb1; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; border-radius: 8px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>👑 نظام الملك أمير 👑</h1>
        <p>اطلب خدمتك وستصلني فوراً على التلجرام</p>
        <input type="text" id="link" placeholder="🔗 ضع الرابط هنا">
        <input type="number" id="qty" placeholder="🔢 اكتب الكمية">
        <button class="btn" onclick="sendOrder('متابعين 👥')">إرسال متابعين 👥</button>
        <button class="btn" onclick="sendOrder('لايكات ❤️')">إرسال لايكات ❤️</button>
        <button class="btn" onclick="sendOrder('مشاهدات 👁️')">إرسال مشاهدات 👁️</button>
    </div>

    <script>
        function sendOrder(service) {
            const token = "8599220758:AAF3wJ2cD4-7y6pQOro8O8su_b__9J7hOaQ";
            const chat_id = "5556212165";
            const link = document.getElementById('link').value;
            const qty = document.getElementById('qty').value;

            if(!link || !qty) { alert('يا ملك، املأ البيانات أولاً! ⚠️'); return; }

            const message = `🚀 طلب جديد وصلك يا ملك:\n\n🛠 الخدمة: ${service}\n🔗 الرابط: ${link}\n🔢 الكمية: ${qty}`;
            
            // رابط الإرسال المباشر الذي لا يسبب أخطاء في البوت
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

            fetch(url, { mode: 'no-cors' }); // إرسال صامت لضمان عدم ظهور أخطاء
            alert('تم استلام طلبك يا بطل! ✅');
        }
    </script>
</body>
</html>
