<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING AMIR | إشعار تلجرام</title>
    <style>
        body { background: #0b0b0b; color: #fb1; font-family: Arial; text-align: center; padding: 50px 20px; }
        .card { border: 2px solid #fb1; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px #fb1; background: #1a1a1a; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { background: #fb1; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 10px; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>👑 نظام التنبيهات 👑</h1>
        <input type="text" id="user_link" placeholder="رابط الحساب المطلوب">
        <input type="number" id="user_qty" placeholder="الكمية المطلوبة">
        <button onclick="notifyMe()">إرسال التنبيه للملك ⚡</button>
    </div>

    <script>
        function notifyMe() {
            const token = "8599220758:AAF3wJ2cD4-7y6pQOro8O8su_b__9J7hOaQ";
            const chat_id = "5556212165";
            const link = document.getElementById('user_link').value;
            const qty = document.getElementById('user_qty').value;

            if(!link || !qty) { alert('يا ملك، الخانات فارغة!'); return; }

            // رسالة نصية بسيطة جداً لا تسبب أخطاء
            const message = `🔔 إشعار جديد:\n👤 الرابط: ${link}\n💎 الكمية: ${qty}`;
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

            fetch(url, { mode: 'no-cors' });
            alert('وصل الإشعار لتلجرامك بنجاح! ✅');
        }
    </script>
</body>
</html>
